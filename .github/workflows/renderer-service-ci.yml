name: Renderer Service Tests

# Scoped to renderer_service/ changes only — this workflow has no reason
# to run when the Next.js app or cad_service/ (the older, separate
# child_process-based pipeline) change.
on:
  push:
    branches: [main]
    paths:
      - "renderer_service/**"
      - ".github/workflows/renderer-service-ci.yml"
  pull_request:
    paths:
      - "renderer_service/**"
      - ".github/workflows/renderer-service-ci.yml"

defaults:
  run:
    working-directory: renderer_service

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: renderer_service/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest --cov=app --cov-report=term-missing

      - name: Build Docker image (smoke test)
        run: docker build -t archpresent-renderer:ci .
