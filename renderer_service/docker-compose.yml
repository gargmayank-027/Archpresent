# renderer_service/docker-compose.yml
#
# Standalone — brings up only the renderer service. Run from inside
# renderer_service/: `docker compose up`. The Next.js app is started
# separately (`npm run dev`) and points RENDERER_URL at this container.

services:
  renderer:
    build: .
    image: archpresent-renderer:dev
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
